services:
  postgres:
    image: postgres:18
    container_name: dsa-digital-rust-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: development
      POSTGRES_USER: dsa_digital_user
      POSTGRES_PASSWORD: dsa_digital_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - 5434:5434
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./configs/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./configs/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5434 -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - dsa-digital-rust-network
networks:
  dsa-digital-rust-network:
    driver: bridge
volumes:
  postgres-data:
